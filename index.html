<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Invitation</title>
    <!-- 引入 Google 字體：優雅的襯線體與乾淨的微軟正黑體 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxjX5BrwboDML_03QJ-9YsQy0rT2K9iedH2jhCfsC1tADZpU-Y4VhNC9tpjRja7Kjbtbg/exec";
    </script>

    <style>
        /* --- CSS 樣式與奶茶風色調設定 --- */
        :root {
            --bg-cream: #FDFBF7;       /* 溫柔暖白底色 */
            --milk-tea: #E6DCD2;       /* 奶油奶茶色 */
            --dark-tea: #8C7A6B;       /* 木質深棕色（文字用） */
            --accent-gold: #C5A880;    /* 質感金調（點綴用） */
            --white: #FFFFFF;
            --shadow: rgba(140, 122, 107, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-cream);
            color: var(--dark-tea);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 浪漫開場區塊 */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, #F9F4EE, var(--bg-cream));
            padding: 20px;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 6px;
            color: var(--dark-tea);
            margin-bottom: 10px;
            animation: fadeInDown 1.2s ease;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 300;
            margin-bottom: 30px;
            animation: fadeInUp 1.2s ease;
        }

        /* 這是新的婚紗照樣式（完美繼承韓式拱門比例與防變形機制） */
.hero-wedding-image {
    width: 100%;
    max-width: 450px;           /* 限制最大寬度，避免電腦版太大 */
    height: auto;               /* 高度自動縮放 */
    aspect-ratio: 3 / 4;        /* 固定相片比例為 3:4 直式（若照片是橫式可改 4 / 3 或刪除此行） */
    object-fit: cover;          /* 防變形機制：自動裁剪多餘邊緣 */
    border-radius: 250px 250px 0 0; /* 完美的韓式拱門曲線 */
    box-shadow: 0 10px 30px var(--shadow);
    animation: fadeIn 1.5s ease;
}

        /* 婚宴資訊區塊 */
        .info-section {
            padding: 80px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 1px;
            background-color: var(--accent-gold);
        }

        .info-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .info-cards { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--white);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px var(--shadow);
            border: 1px solid rgba(230, 220, 210, 0.5);
        }

        .card h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--accent-gold);
        }

        /* RSVP 表單區塊 */
        .rsvp-section {
            background-color: #F6F0E8;
            padding: 80px 20px;
        }

        .rsvp-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--white);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px var(--shadow);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* 輸入框樣式 */
        input[type="text"], input[type="email"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--milk-tea);
            border-radius: 8px;
            background-color: var(--bg-cream);
            color: var(--dark-tea);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus, input[type="email"]:focus, select:focus, textarea:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(197, 168, 128, 0.2);
        }

        /* 單選鈕按鈕組 */
        .radio-group {
            display: flex;
            gap: 15px;
        }

        .radio-label {
            flex: 1;
            display: block;
            text-align: center;
            padding: 12px;
            border: 1px solid var(--milk-tea);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: var(--bg-cream);
            font-size: 0.95rem;
        }

        /* 隱藏原生 Radio */
        .radio-group input[type="radio"] {
            display: none;
        }

        /* 選取時樣式 */
        .radio-group input[type="radio"]:checked + .radio-label {
            background-color: var(--dark-tea);
            color: var(--white);
            border-color: var(--dark-tea);
        }

        /* 動態隱藏區塊 CSS */
        .conditional-fields {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-out, opacity 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .conditional-fields.show {
            max-height: 1000px;
            opacity: 1;
            pointer-events: auto;
        }
        
        .conditional-inner {
            padding: 20px 0 10px 0;
            border-top: 1px solid var(--milk-tea);
            margin-top: 15px;
        }

        /* 貼心提示文字樣式 */
        .hint-text {
            color: var(--accent-gold);
            font-size: 0.88rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        /* 送出按鈕 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #B3966E;
        }

        /* 頁尾 */
        .footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #A39284;
        }

        /* 動畫效果定義 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 1. 浪漫開場區塊 -->
    <section class="hero-section">
    <h1 class="hero-title">S & S</h1>
    <p class="hero-subtitle">2027.05.15 | 誠摯邀請您參與我們的婚禮</p>
    <img src="IMG_4657.png" alt="Wedding Photo" class="hero-wedding-image">
</section>

    <!-- 2. 婚宴資訊區塊 -->
    <section class="info-section">
        <h2 class="section-title">Wedding Details</h2>
        <div class="info-cards">
            <div class="card">
                <h3>時間 / TIME</h3>
                <p>2027 年 5 月 15 日 (星期六)</p>
                <p><strong>中午 12:00 喜宴開席</strong></p>
            </div>
            <div class="card">
                <h3>地點 / LOCATION</h3>
                <p>大中華國際美食館</p>
                <p>508彰化縣和美鎮柑井里彰美路四段306號</p>
                <p style="font-size: 0.85rem; margin-top: 10px; color:#A39284;">※ 備有免費室外停車場</p>
            </div>
        </div>
    </section>

    <!-- 3. RSVP 表單區塊 -->
    <section class="rsvp-section">
        <div class="rsvp-container">
            <h2 class="section-title" style="margin-bottom: 30px;">RSVP</h2>
            <form id="weddingForm">
                
                <!-- 姓名 -->
                <div class="form-group">
                    <label for="guestName">您的姓名</label>
                    <input type="text" id="guestName" name="guestName" required placeholder="請填寫您的真實姓名">
                </div>

                <!-- 親友歸屬 -->
                <div class="form-group">
                    <label>您是哪一方的親友？</label>
                    <div class="radio-group">
                        <input type="radio" id="side男" name="guestSide" value="男方" required>
                        <label for="side男" class="radio-label">男方新郎</label>

                        <input type="radio" id="side女" name="guestSide" value="女方">
                        <label for="side女" class="radio-label">女方新娘</label>
                    </div>
                </div>

                <!-- 關係歸類 -->
                <div class="form-group">
                    <label for="relationship">與新人的關係分類</label>
                    <select id="relationship" name="relationship" required>
                        <option value="" disabled selected>請選擇您的關係類別</option>
                        <option value="主家親戚">雙方親戚 / 長輩</option>
                        <option value="國高中同學">國中 / 高中同學</option>
                        <option value="大學同學">大學 / 大專同學</option>
                        <option value="公司同事">公司同事 / 主管</option>
                        <option value="通訊好友">生活至交 / 其他好友</option>
                    </select>
                </div>

                <!-- 出席意願 -->
                <div class="form-group">
                    <label>出席意願</label>
                    <div class="radio-group">
                        <input type="radio" id="attendYes" name="attendance" value="出席" required>
                        <label for="attendYes" class="radio-label">熱情出席</label>

                        <input type="radio" id="attendNo" name="attendance" value="無法前往">
                        <label for="attendNo" class="radio-label">精神同在</label>
                    </div>
                </div>

                <!-- 「出席」才會展開的動態區塊 -->
                <div id="attendDetails" class="conditional-fields">
                    <div class="conditional-inner">
                        <div class="form-group">
                            <label for="guestCount">出席總人數</label>
                            <select id="guestCount" name="guestCount">
                                <option value="1">1 位</option>
                                <option value="2">2 位</option>
                                <option value="3">3 位</option>
                                <option value="4">4 位</option>
                                <option value="5">5 位以上</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="diet">飲食習慣</label>
                            <select id="diet" name="diet">
                                <option value="葷食">均為葷食</option>
                                <option value="全素">有準備全素</option>
                                <option value="蛋奶素">有準備蛋奶素</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 喜帖形式 -->
                <div class="form-group">
                    <label>喜帖形式</label>
                    <div class="radio-group">
                        <input type="radio" id="typeDigital" name="inviteType" value="電子" required>
                        <label for="typeDigital" class="radio-label" id="digitalLabel">電子喜帖 (環保)</label>

                        <input type="radio" id="typePaper" name="inviteType" value="紙本">
                        <label for="typePaper" class="radio-label">紙本喜帖 (傳統)</label>
                    </div>
                </div>

                <!-- 「電子喜帖」動態跳出 Email -->
                <div id="emailField" class="conditional-fields">
                    <div class="conditional-inner">
                        <div class="form-group">
                            <span id="emailHint" class="hint-text">✉️ 專屬報到 QR Code 與電子喜帖將會發送到此信箱：</span>
                            <input type="email" id="guestEmail" name="guestEmail" placeholder="example@gmail.com">
                        </div>
                    </div>
                </div>

                <!-- 「紙本喜帖」動態跳出 地址 -->
                <div id="addressField" class="conditional-fields">
                    <div class="conditional-inner">
                        <div class="form-group">
                            <span class="hint-text">✨ 為了將紙本溫暖傳遞給您，請留下收件地址：</span>
                            <input type="text" id="guestAddress" name="guestAddress" placeholder="郵遞區號與完整地址">
                        </div>
                    </div>
                </div>

                <!-- 祝福的話 -->
                <div class="form-group">
                    <label for="blessing">給新人的祝福語</label>
                    <textarea id="blessing" name="blessing" rows="3" placeholder="留下想對我們說的話吧..."></textarea>
                </div>

                <!-- 送出按鈕 -->
                <button type="submit" class="submit-btn" id="submitBtn">送出回覆</button>
            </form>
        </div>
    </section>

    <!-- 4. 頁尾 -->
    <footer class="footer">
        <p>Thank you for being a part of our story.</p>
        <p style="margin-top: 5px; font-size: 0.75rem;">© 2027 S & S. All Rights Reserved.</p>
    </footer>

    <!-- --- JavaScript 邏輯控制 --- -->
    <script>
        const attendRadios = document.querySelectorAll('input[name="attendance"]');
        const attendDetails = document.getElementById('attendDetails');
        const inviteRadios = document.querySelectorAll('input[name="inviteType"]');

        const emailField = document.getElementById('emailField');
        const addressField = document.getElementById('addressField');
        const emailInput = document.getElementById('guestEmail');
        const addressInput = document.getElementById('guestAddress');

        const digitalLabel = document.getElementById('digitalLabel');
        const emailHint = document.getElementById('emailHint');

        // 1. 監聽「出席意願」改變
        attendRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                const guestCountInput = document.getElementById('guestCount');
                const dietInput = document.getElementById('diet');

                if (e.target.value === '出席') {
                    attendDetails.classList.add('show');
                    digitalLabel.innerText = '電子喜帖 (環保)';
                    if(guestCountInput) guestCountInput.required = true;
                    if(dietInput) dietInput.required = true;
                } else {
                    attendDetails.classList.remove('show');
                    digitalLabel.innerText = '電子喜帖 (純留念)';
                    if(guestCountInput) guestCountInput.required = false;
                    if(dietInput) dietInput.required = false;
                }

                const currentTicket = document.querySelector('input[name="inviteType"]:checked');
                if (currentTicket && currentTicket.value === '電子') {
                    updateEmailHint(e.target.value);
                }
            });
        });

        // 2. 監聽「喜帖形式」改變
        inviteRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                const currentAttend = document.querySelector('input[name="attendance"]:checked');
                const attendValue = currentAttend ? currentAttend.value : '出席';

                if (e.target.value === '電子') {
                    emailField.classList.add('show');
                    addressField.classList.remove('show');
                    emailInput.required = true;
                    addressInput.required = false; // 隱藏了，絕對不能必填
                    addressInput.value = '';        // 清空內容
                    updateEmailHint(attendValue); 
                } else if (e.target.value === '紙本') {
                    addressField.classList.add('show');
                    emailField.classList.remove('show');
                    addressInput.required = true;
                    emailInput.required = false;   // 隱藏了，絕對不能必填
                    emailInput.value = '';         // 清空內容
                }
            });
        });

        function updateEmailHint(attendStatus) {
            if (attendStatus === '出席') {
                emailHint.innerText = '✉️ 專屬報到 QR Code 與電子喜帖將會發送到此信箱：';
            } else {
                emailHint.innerText = '💝 謝謝您的祝福！珍藏版電子喜帖（不含報到條碼）將會寄至此信箱：';
            }
        }

        // 3. 表單真正送出發射到 GAS 
        document.getElementById('weddingForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = '正在傳送幸福回覆...';
            btn.disabled = true;

            // ✨ 優化版的打包邏輯
            const isAttending = document.querySelector('input[name="attendance"]:checked')?.value === '出席';
            const inviteTypeSelected = document.querySelector('input[name="inviteType"]:checked')?.value || '';

            const payload = {
                name: document.getElementById('guestName').value,
                side: document.querySelector('input[name="guestSide"]:checked')?.value || '',
                relationship: document.getElementById('relationship').value,
                status: document.querySelector('input[name="attendance"]:checked')?.value || '',
                count: isAttending ? (document.getElementById('guestCount')?.value || '1') : '0',
                diet: isAttending ? (document.getElementById('diet')?.value || '葷食') : '',
                invite_type: inviteTypeSelected,
                // 防禦性修剪：如果沒選或被隱藏，直接給空字串
                email: (inviteTypeSelected === '電子') ? (document.getElementById('guestEmail')?.value || '') : '',
                address: (inviteTypeSelected === '紙本') ? (document.getElementById('guestAddress')?.value || '') : '',
                blessing: document.getElementById('blessing').value
            };

            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('收到您的回覆囉！期待與您相見！');
                document.getElementById('weddingForm').reset(); 
                
                // 重設所有狀態
                attendDetails.classList.remove('show');
                emailField.classList.remove('show');
                addressField.classList.remove('show');
                emailInput.required = false;
                addressInput.required = false;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('糟了，連線好像有點問題，請再試一次！');
            })
            .finally(() => {
                btn.innerText = '送出回覆';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
